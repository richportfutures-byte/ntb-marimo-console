name: CI Smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run test suite
        run: pytest -q

      - name: Run deterministic CLI smoke path
        env:
          GEMINI_API_KEY: ci-placeholder
          PYTHONDONTWRITEBYTECODE: "1"
        run: python tests/cli_smoke_runner.py

      - name: Run deterministic ES compiler to runtime smoke path
        env:
          GEMINI_API_KEY: ci-placeholder
          PYTHONDONTWRITEBYTECODE: "1"
        run: python tests/compiler_runtime_smoke_runner.py
